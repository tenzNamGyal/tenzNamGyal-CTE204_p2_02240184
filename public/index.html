<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Academic Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>📚 Academic Tracker</h1>
    <p>Track subjects, marks, credits & GPA</p>
  </header>

  <main>
    <section class="card">
      <h2>Add Subject</h2>
      <form id="form">
        <input id="subject" placeholder="Subject Name" required>
        <input id="marks" type="number" placeholder="Marks (0-100)" min="0" max="100" required>
        
        <select id="credits">
          <option value="1">1 Credit</option>
          <option value="2">2 Credits</option>
          <option value="3">3 Credits</option>
          <option value="4">4 Credits</option>
        </select>
        
        <button type="submit">Add Subject</button>
      </form>
      <p id="error"></p>
    </section>

    <section class="card stats">
      <div>GPA <h3 id="gpa">0.00</h3></div>
      <div>Subjects <h3 id="count">0</h3></div>
      <div>Average <h3 id="avg">0</h3></div>
    </section>

    <section class="card">
      <h2>Subject List</h2>
      <table>
        <thead>
          <tr>
            <th>Subject</th>
            <th>Marks</th>
            <th>Grade</th>
            <th>Credits</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="list"></tbody>
      </table>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
